server:
  port: 8083
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cards_informatiomdb
    username: root
    password: c6e24f77874b1173345e1ee506d44aa3b05796d556b8c68d58db632bc3639618
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: CapitalsTransactionPool
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 60000
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false




app:
  card:
    default-daily-limit: 60000.00
    default-monthly-limit: 300000.00
    default-transaction-limit: 10000.00
    card-number-prefix:
      VISA: "4"
      MASTERCARD: "5"
      RUPAY: "6"
