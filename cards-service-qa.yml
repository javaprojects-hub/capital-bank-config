server:
  port: 8083
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cards_informatiomdb_qa
    username: root
    password: Pranathi@2005
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: CapitalsTransactionPool
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 60000
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  card:
    default-daily-limit: 80000.00
    default-monthly-limit: 300000.00
    default-transaction-limit: 30000.00
    card-number-prefix:
      VISA: "8"
      MASTERCARD: "8"
      RUPAY: "9"
